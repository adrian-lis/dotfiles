command_timeout = 5000

[username]
show_always = true
style_user = "bg:#343f44 fg:#a7c080 bold"
style_root = "bg:#343f44 fg:#e67e80 bold"
format = '[$user]($style)' # UsunńÖŇāem spacjńô po user, Ňľeby @hostname Ňāadnie przylegaŇāo

[hostname]
ssh_only = true
style = "bg:#343f44 fg:#7fbbb3 bold"
format = '[_remote_style]($style)[@$hostname ]($style)'

[directory]
style = "bg:#3d484d fg:#dbbc7f bold"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

