source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 650, 100
    position = 0, -100
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 4

    font_family = MesloLGL Nerd Font
    font_color = $font_color

    placeholder_text = Enter Password
    check_color = $check_color
    capslock_color = $check_color  # Zmiana koloru ramki przy włączonym Caps Locku
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}

# --- GŁÓWNY STOS (ŚRODEK) ---

# POWITANIE (Użytkownik @ Host)
# label {
    monitor =
    text = cmd[update:0] echo "$USER@$(hostname)"
    color = $font_color
    font_size = 14
    font_family = MesloLGL Nerd Font
    position = 0, 240
    halign = center
    valign = center
    shadow_passes = 0
}

# ZEGAR CYFROWY (Z SEKUNDAMI)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
    color = $font_color
    font_size = 90
    font_family = MesloLGL Nerd Font Bold
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 0
}

# DATA
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B")"
    color = $font_color
    font_size = 24
    font_family = MesloLGL Nerd Font
    position = 0, 50
    halign = center
    valign = center
    shadow_passes = 0
}

# --- DOLNY PASEK STATUSU ---

# ODTWARZACZ MUZYKI (Środek, dół)
# label {
    monitor =
    text = cmd[update:1000] playerctl metadata --format '󰎆 {{ title }} - {{ artist }}' 2>/dev/null || echo ""
    color = $font_color
    font_size = 14
    font_family = MesloLGL Nerd Font
    position = 0, 60
    halign = center
    valign = bottom
    shadow_passes = 0
}

# BATERIA (Lewy, dół) - jeśli używasz komputera stacjonarnego, możesz usunąć ten blok
label {
    monitor =
    text = cmd[update:5000] echo "󰁹 $(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null || echo '100')%"
    color = $font_color
    font_size = 14
    font_family = MesloLGL Nerd Font
    position = 40, 40
    halign = left
    valign = bottom
    shadow_passes = 0
}

# UKŁAD KLAWIATURY (Prawy, dół)
label {
    monitor =
    text = 󰌌 $LAYOUT
    color = $font_color
    font_size = 14
    font_family = MesloLGL Nerd Font
    position = -40, 40
    halign = right
    valign = bottom
    shadow_passes = 0
}
